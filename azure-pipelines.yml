parameters:
  - name: publish
    displayName: Publish
    type: boolean
    default: false
  - name: publishVersion
    displayName: Publish Version
    type: string
    default: minor
    values:
      - major
      - minor
      - patch

trigger:
  - main
    
pr:
  - main

pool:
  name: 'Stackworx'

resources:
  repositories:
    - repository: templates
      name: BuildTemplates/templates
      type: git
  
stages:
  - stage: Build
    jobs:
      - template: node-library.build.yml@templates
        parameters:
          nodeVersion: '24.x'
          script: |
            npm run fmt:check
            npm run typecheck
            npm run test
            npm run build

  - ${{ if eq(parameters.publish, 'true') }}:
    - stage: Publish
      jobs:
        - template: node-library.publish.yml@templates
          parameters:
            nodeVersion: '20.x'
            version: ${{ parameters.publishVersion }}