trigger:
  - main
    
pr:
  - main

pool:
  name: 'Stackworx'

resources:
  repositories:
    - repository: templates
      name: BuildTemplates/templates
      type: git

# variables:
#   - group: ci
  
stages:
  - stage: Build
    jobs:
      - template: node-library.build.yml@templates
        parameters:
          nodeVersion: '20.x'
          script: |
            npm run fmt:check
            npm run typecheck
            npm run test
            npm run build

  - ${{ if startsWith(variables['Build.SourceBranch'], 'refs/tags/') }}:
    - stage: Publish
      jobs:
        - template: node-library.publish.yml@templates
          parameters:
            nodeVersion: '20.x'